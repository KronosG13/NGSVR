<svg width="512" height="512" viewBox="0 0 680 680" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>NGSVR Logo</title>
  <desc>Eclipse logo with glowing corona ring and NGSVR text on dark background</desc>

  <defs>
    <radialGradient id="bg-glow" cx="38%" cy="38%" r="65%">
      <stop offset="0%" stop-color="#3a3a3a"/>
      <stop offset="40%" stop-color="#111111"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <radialGradient id="corona-outer" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#000000" stop-opacity="0"/>
      <stop offset="72%"  stop-color="#000000" stop-opacity="0"/>
      <stop offset="78%"  stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="83%"  stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="86%"  stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="88%"  stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="90%"  stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="94%"  stop-color="#ffffff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="70%"  stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="82%"  stop-color="#ffffff" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="top-left-flare" cx="20%" cy="20%" r="60%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="40%"  stop-color="#ffffff" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="680" height="680" fill="#000000"/>
  <rect width="680" height="680" fill="url(#bg-glow)"/>
  <circle cx="340" cy="320" r="310" fill="url(#top-left-flare)"/>
  <circle cx="340" cy="320" r="280" fill="url(#glow-halo)"/>
  <circle cx="340" cy="320" r="280" fill="url(#glow-halo)"/>
  <circle cx="340" cy="320" r="280" fill="url(#corona-outer)"/>
  <circle cx="340" cy="320" r="218" fill="#000000"/>

  <text
    x="340" y="300"
    text-anchor="middle"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-weight="900"
    font-size="72"
    letter-spacing="14"
    fill="#ffffff"
    opacity="0.92"
  >NGS</text>

  <text
    x="344" y="374"
    text-anchor="middle"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-weight="900"
    font-size="56"
    letter-spacing="22"
    fill="#ffffff"
    opacity="0.75"
  >VR</text>
</svg>
